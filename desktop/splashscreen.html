<!doctype html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playdrive Splash</title>
    <style>
        @font-face {
            font-family: 'MicroSquare';
            src: url('/fonts/MicroSquare-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --bg-start: #0f2d63;
            --bg-mid: #071327;
            --bg-end: #030814;
            --card-bg-top: rgba(12, 26, 58, 0.96);
            --card-bg-bottom: rgba(8, 18, 43, 0.92);
            --card-border: rgba(75, 98, 148, 0.28);
            --text-main: #ffffff;
            --text-soft: #9fb2d9;
            --glow-blue: rgba(59, 130, 246, 0.26);
            --glow-purple: rgba(168, 85, 247, 0.2);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Inter, Segoe UI, Arial, sans-serif;
            background:
                radial-gradient(circle at 20% 18%, rgba(59, 130, 246, 0.18), transparent 30%),
                radial-gradient(circle at 80% 78%, rgba(168, 85, 247, 0.14), transparent 28%),
                radial-gradient(circle at top, var(--bg-start) 0%, var(--bg-mid) 46%, var(--bg-end) 100%);
        }

        body::before,
        body::after {
            content: "";
            position: absolute;
            border-radius: 999px;
            filter: blur(80px);
            pointer-events: none;
            opacity: 0.8;
        }

        body::before {
            width: 280px;
            height: 280px;
            left: -60px;
            top: -40px;
            background: var(--glow-blue);
            animation: drift1 7s ease-in-out infinite alternate;
        }

        body::after {
            width: 240px;
            height: 240px;
            right: -40px;
            bottom: -30px;
            background: var(--glow-purple);
            animation: drift2 8s ease-in-out infinite alternate;
        }

        .wrap {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            position: relative;
            width: 520px;
            max-width: 100%;
            padding: 42px 36px 34px;
            border-radius: 30px;
            border: 1px solid var(--card-border);
            background: linear-gradient(
                180deg,
                var(--card-bg-top) 0%,
                var(--card-bg-bottom) 100%
            );
            box-shadow:
                0 28px 80px rgba(0, 0, 0, 0.45),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
            text-align: center;
            overflow: hidden;
            animation: cardIn 0.7s ease-out both;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(
                115deg,
                transparent 25%,
                rgba(255, 255, 255, 0.08) 45%,
                rgba(255, 255, 255, 0.02) 52%,
                transparent 68%
            );
            transform: translateX(-160%);
            animation: shine 3.4s ease-in-out infinite;
            pointer-events: none;
        }

        .logo-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .logo-wrap::before,
        .logo-wrap::after {
            content: "";
            position: absolute;
            border-radius: 999px;
            filter: blur(26px);
            z-index: 0;
        }

        .logo-wrap::before {
            width: 150px;
            height: 150px;
            background: rgba(59, 130, 246, 0.22);
            animation: pulseGlow 2.4s ease-in-out infinite;
        }

        .logo-wrap::after {
            width: 110px;
            height: 110px;
            background: rgba(168, 85, 247, 0.16);
            animation: pulseGlow 2.4s ease-in-out infinite 0.4s;
        }

        .logo {
            position: relative;
            z-index: 1;
            width: 118px;
            height: 118px;
            object-fit: contain;
            display: block;
            filter: drop-shadow(0 0 18px rgba(59, 130, 246, 0.28));
            animation: logoFloat 2.8s ease-in-out infinite;
        }

        .title {
            margin-top: 10px;
            margin-bottom: 8px;
            font-family: 'MicroSquare', Inter, Segoe UI, Arial, sans-serif;
            font-size: 38px;
            line-height: 1;
            letter-spacing: 0.12em;
            color: var(--text-main);
        }

        .subtitle {
            color: var(--text-soft);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .loader {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: linear-gradient(180deg, #7db7ff 0%, #4f7dff 100%);
            box-shadow: 0 0 14px rgba(79, 125, 255, 0.4);
            animation: bounce 1.15s infinite ease-in-out;
        }

        .dot:nth-child(2) {
            animation-delay: 0.14s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.28s;
        }

        .status {
            margin-top: 16px;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(159, 178, 217, 0.72);
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.985);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes shine {
            0% {
                transform: translateX(-160%);
            }
            55%,
            100% {
                transform: translateX(180%);
            }
        }

        @keyframes pulseGlow {
            0%,
            100% {
                transform: scale(0.96);
                opacity: 0.72;
            }
            50% {
                transform: scale(1.05);
                opacity: 1;
            }
        }

        @keyframes logoFloat {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-3px);
            }
        }

        @keyframes bounce {
            0%,
            80%,
            100% {
                transform: scale(0.72);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes drift1 {
            from {
                transform: translate3d(0, 0, 0);
            }
            to {
                transform: translate3d(22px, 14px, 0);
            }
        }

        @keyframes drift2 {
            from {
                transform: translate3d(0, 0, 0);
            }
            to {
                transform: translate3d(-18px, -12px, 0);
            }
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="card">
        <div class="logo-wrap">
            <img class="logo" src="/images/logos/icon.png" alt="Playdrive" />
        </div>

        <div class="title">PLAYDRIVE</div>
        <div class="subtitle">Desktop wordt opgestart…</div>

        <div class="loader" aria-hidden="true">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div class="status">Loading</div>
    </div>
</div>
</body>
</html>
